---
- name: Configure Web Server
  hosts: webservers
  become: yes

  tasks:
    - name: Update apt packages
      apt:
        update_cache: yes

    - name: Install Nginx
      apt:
        name: nginx
        state: present

    - name: Start Nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Create welcome file
      copy:
        content: "Hello from Ansible! Server managed by Balogun Ibrahim"
        dest: /var/www/html/index.html
