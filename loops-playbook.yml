---
- name: Playbook with Loops
  hosts: webservers
  become: yes

  tasks:
    - name: Install multiple packages
      apt:
        name: "{{ item }}"
        state: present
      loop:
        - curl
        - vim
        - git
        - tree

    - name: Create multiple files
      file:
        path: "/tmp/{{ item }}"
        state: touch
      loop:
        - file1.txt
        - file2.txt
        - file3.txt
